version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "9999:9999"
    depends_on:
      - user-service
      - product-service
      - order-service
      - admin-service

  user-service:
    build: ./user-service
    ports:
      - "1111:1111"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/user_db
      SPRING_DATASOURCE_USERNAME: quizuser
      SPRING_DATASOURCE_PASSWORD: quizpassword

  product-service:
    build: ./product-service
    ports:
      - "2222:2222"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/product_db
      SPRING_DATASOURCE_USERNAME: quizuser
      SPRING_DATASOURCE_PASSWORD: quizpassword

  order-service:
    build: ./order-service
    ports:
      - "3333:3333"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/order_db
      SPRING_DATASOURCE_USERNAME: quizuser
      SPRING_DATASOURCE_PASSWORD: quizpassword

  admin-service:
    build: ./admin-service
    ports:
      - "4444:4444"
