<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Səbət')}"></head>
<body>
<th:block th:replace="~{fragments/nav :: navbar}"></th:block>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-shopping-cart me-2"></i>Səbət</h2>
        <a href="/home" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Alış-verişə davam et
        </a>
    </div>

    <div th:if="${cart == null or #lists.isEmpty(cart)}">
        <div class="alert alert-info text-center">
            <i class="fas fa-shopping-cart me-2"></i>Səbətiniz boşdur.
            <a href="/home" class="btn btn-primary ms-2">Məhsullara bax</a>
        </div>
    </div>

    <div th:if="${cart != null and !#lists.isEmpty(cart)}">
        <div class="card mb-3">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Məhsul</th>
                        <th>Qiymət</th>
                        <th>Miqdar</th>
                        <th>Cəmi</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cart}">
                        <td th:text="${item.productName}"></td>
                        <td th:text="${item.price} + ' AZN'"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.totalPrice} + ' AZN'"></td>
                        <td>
                            <form th:action="@{/cart/remove}" method="post" style="display:inline">
                                <input type="hidden" name="productId" th:value="${item.productId}"/>
                                <button class="btn btn-sm btn-danger" type="submit">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr>
                        <td colspan="3" class="text-end fw-bold">Ümumi:</td>
                        <td class="fw-bold text-success" th:text="${total} + ' AZN'"></td>
                        <td></td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="text-end">
            <form th:action="@{/cart/checkout}" method="post">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="fas fa-check me-1"></i>Sifariş ver
                </button>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
