<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Sifarişlərim')}"></head>
<body>
<th:block th:replace="~{fragments/nav :: navbar}"></th:block>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-shopping-cart me-2"></i>Sifarişlərim</h2>
        <a href="/home" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Geri
        </a>
    </div>
    <div class="card">
        <div class="card-body">
            <div th:if="${orders == null or #lists.isEmpty(orders)}">
                <p class="text-center text-muted mt-3">Heç bir sifarişiniz yoxdur.</p>
            </div>
            <table th:if="${orders != null and !#lists.isEmpty(orders)}" class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Məhsul ID</th>
                    <th>Miqdar</th>
                    <th>Ümumi Qiymət</th>
                    <th>Status</th>
                    <th>Tarix</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.productId}"></td>
                    <td th:text="${order.quantity}"></td>
                    <td th:text="${order.totalPrice} + ' AZN'"></td>
                    <td>
                            <span class="badge"
                                  th:classappend="${order.status == 'PENDING'} ? 'bg-warning text-dark' :
                                                  (${order.status == 'CONFIRMED'} ? 'bg-info text-dark' :
                                                  (${order.status == 'SHIPPED'} ? 'bg-primary' : 'bg-success'))"
                                  th:text="${order.status}">
                            </span>
                    </td>
                    <td th:text="${order.createdAt}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
